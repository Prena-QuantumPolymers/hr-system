<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="department" placeholder="Department"><br><br>

<button onclick="register()">Register</button>

<p id="msg"></p>

<script>
async function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const department = document.getElementById("department").value;

    const res = await fetch("http://145.223.96.85:3000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password, department })
    });

    const data = await res.json();
    document.getElementById("msg").innerText = data.message;
}

document.getElementById("msg").innerText = "Registered successfully. Redirecting...";

setTimeout(() => {
    window.location.href = "login.html";
}, 1500);
</script>
<br><br>
<button onclick="window.location.href='login.html'">Go to Login</button>
<button onclick="window.location.href='register.html'">Go to Register</button>
</body>
</html>

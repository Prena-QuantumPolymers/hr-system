<!DOCTYPE html>
<html>
<head>
    <title>HR System - Register</title>
</head>
<body>

    <h2>Employee Registration</h2>

    <input id="name" placeholder="Name" /><br><br>
    <input id="email" placeholder="Email" /><br><br>
    <input id="password" placeholder="Password" type="password" /><br><br>
    <input id="department" placeholder="Department" /><br><br>

    <button onclick="register()">Register</button>

    <p id="output"></p>

    <script>
        async function register() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const department = document.getElementById("department").value;

            try {
                const res = await fetch("http://145.223.96.85:3000/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        department
                    })
                });

                const data = await res.json();
                document.getElementById("output").innerText = data.message;

            } catch (err) {
                document.getElementById("output").innerText = "Server error";
            }
        }
    </script>

</body>
</html>
